services:
  - type: web
    name: cnn-lcs-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: API_ALLOW_ORIGINS
        sync: false
      - key: MODEL_CHECKPOINT
        sync: false
      - key: LCS_DIR
        sync: false
      - key: REQUIRE_APPROVED_LCS
        value: "false"
